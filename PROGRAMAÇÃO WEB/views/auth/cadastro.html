<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>AgendaWeb</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    
</head>
<body class="min-vh-100 d-flex flex-column justify-content-center align-items-center p-3">

    <div class="text-center mb-4">
        <a href="/" class="text-decoration-none">
            <h1 class="auth-title font-display text-dourado m-0" >AgendaWeb</h1>
        </a>
    </div>

    <div class="auth-card bg-white p-4 p-md-5">
        <h3 class="font-display text-preto mb-4 text-center">Criar Conta</h3>
        
        {{#erro}}
        <div class="small-alert alert alert-danger" role="alert" >
            {{erro}}
        </div>
        {{/erro}}

        <form action="/cadastrar_usuario" method="post">
            <div class="mb-3">
                <label for="nome" class="tracking-wide-sm form-label text-cinza-medio small fw-bold text-uppercase" >Nome Completo</label>
                <input type="text" id="nome" name="nome" class="form-control form-control-lg bg-offwhite border border-cinza-suave" required>
            </div>

            <div class="mb-3">
                <label for="email" class="tracking-wide-sm form-label text-cinza-medio small fw-bold text-uppercase" >E-mail</label>
                <input type="email" id="email" name="email" class="form-control form-control-lg bg-offwhite border border-cinza-suave" required>
            </div>
            
            <div class="mb-4">
                <label for="senha" class="tracking-wide-sm form-label text-cinza-medio small fw-bold text-uppercase" >Senha</label>
                <input type="password" id="senha" name="senha" class="form-control form-control-lg bg-offwhite border border-cinza-suave" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Cadastrar</button>
            
            <div class="text-center">
                <span class="text-muted small">Já possui uma conta?</span>
                <a href="/login" class="text-dourado text-decoration-none small fw-bold">Faça login</a>
            </div>
        </form>
    </div>

</body>
</html>
